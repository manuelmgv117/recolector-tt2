<!DOCTYPE html>
<html lang=\"es\">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recolección de Dinámica de Tecleo - TT2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        .container { background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #2c3e50; font-size: 24px; }
        p { font-size: 15px; color: #555; margin-bottom: 20px; line-height: 1.5; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[type="password"] { font-family: monospace; letter-spacing: 4px; }
        .password-target { font-size: 20px; font-weight: bold; color: #e74c3c; background-color: #fadbd8; padding: 10px; border-radius: 4px; display: inline-block; margin-bottom: 20px; letter-spacing: 2px; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; transition: background-color 0.3s; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .download-btn { background-color: #2ecc71; margin-top: 15px; }
        .download-btn:hover { background-color: #27ae60; }
        .status { margin-top: 20px; font-size: 15px; color: #7f8c8d; }
        .counter { font-weight: bold; color: #2c3e50; }
        #messageBox { margin-top: 15px; font-weight: bold; min-height: 20px; }
        .error-msg { color: #c0392b; }
        .success-msg { color: #27ae60; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Recolección de Biometría Conductual</h1>
        <p>Por favor, escribe la siguiente contraseña exactamente como se muestra. Intenta hacerlo de forma fluida y natural. Puedes usar el Shift (izquierdo/derecho) o Bloq Mayús de tu preferencia para la letra mayúscula.</p>
        
        <div class="password-target">.tie5Roanl</div>

        <div class="input-group">
            <label for="subjectId">Identificador del usuario (Su nombre):</label>
            <input type="text" id="subjectId" placeholder="Ej. s_sinodal1" value="s_sinodal">
        </div>

        <div class="input-group">
            <label for="passwordField">Escribe la contraseña + [Enter]:</label>
            <input type="password" id="passwordField" autocomplete="off" placeholder="Escribe aquí..." autofocus>
        </div>

        <div id="messageBox"></div>

        <div class="status">
            Muestras guardadas en esta sesión: <span id="sampleCount" class="counter">0</span>
        </div>

        <button id="downloadBtn" class="download-btn">Descargar Dataset (.CSV)</button>
    </div>

    <script>
        const TARGET_PASSWORD = ".tie5Roanl";
        let capturedEvents = [];
        let samples = [];
        let repCounter = 1;

        const passwordField = document.getElementById('passwordField');
        const subjectIdField = document.getElementById('subjectId');
        const sampleCountDisplay = document.getElementById('sampleCount');
        const messageBox = document.getElementById('messageBox');
        const downloadBtn = document.getElementById('downloadBtn');

        // Columnas oficiales del dataset DSL-StrongPasswordData
        const COLUMNS = [
            'subject', 'sessionIndex', 'rep',
            'H.period', 'DD.period.t', 'UD.period.t',
            'H.t', 'DD.t.i', 'UD.t.i',
            'H.i', 'DD.i.e', 'UD.i.e',
            'H.e', 'DD.e.five', 'UD.e.five',
            'H.five', 'DD.five.Shift.r', 'UD.five.Shift.r',
            'H.Shift.r', 'DD.Shift.r.o', 'UD.Shift.r.o',
            'H.o', 'DD.o.a', 'UD.o.a',
            'H.a', 'DD.a.n', 'UD.a.n',
            'H.n', 'DD.n.l', 'UD.n.l',
            'H.l', 'DD.l.Return', 'UD.l.Return',
            'H.Return'
        ];

        passwordField.addEventListener('keydown', (e) => {
            if (capturedEvents.length === 0) {
                messageBox.textContent = '';
            }
            
            // Ignoramos el registro de la tecla Bloq Mayús en sí misma para no romper los índices físicos
            if (e.key === 'CapsLock') return; 
            
            capturedEvents.push({
                key: e.key,
                code: e.code,
                type: 'keydown',
                time: performance.now()
            });
        });

        passwordField.addEventListener('keyup', (e) => {
            if (e.key === 'CapsLock') return;

            capturedEvents.push({
                key: e.key,
                code: e.code,
                type: 'keyup',
                time: performance.now()
            });

            if (e.key === 'Enter') {
                processSequence();
            }
        });

        function showMessage(msg, isError = false) {
            messageBox.textContent = msg;
            messageBox.className = isError ? 'error-msg' : 'success-msg';
        }

        function processSequence() {
            let keydowns = capturedEvents.filter(e => e.type === 'keydown');
            let keyups = capturedEvents.filter(e => e.type === 'keyup');

            // Validación estricta del texto plano introducido
            if (passwordField.value !== TARGET_PASSWORD) {
                showMessage("Secuencia incorrecta o hubo teclas de borrado. Intenta de nuevo.", true);
                resetCapture(true);
                return;
            }

            let features = {};
            let subject = subjectIdField.value.trim() || 's_sinodal';

            // Identificar si existió algún evento físico de Shift (izquierdo o derecho)
            let shiftDown = keydowns.find(e => e.code === 'ShiftLeft' || e.code === 'ShiftRight');
            let shiftUp = keyups.find(e => e.code === 'ShiftLeft' || e.code === 'ShiftRight');

            // Helper para mapear los eventos por carácter de salida
            const getKeyEvents = (keyName) => {
                return {
                    down: keydowns.find(e => e.key === keyName),
                    up: keyups.find(e => e.key === keyName)
                };
            };

            let p = getKeyEvents('.');
            let t = getKeyEvents('t');
            let i = getKeyEvents('i');
            let e = getKeyEvents('e');
            let f = getKeyEvents('5');
            let r = getKeyEvents('R');
            let o = getKeyEvents('o');
            let a = getKeyEvents('a');
            let n = getKeyEvents('n');
            let l = getKeyEvents('l');
            let ret = getKeyEvents('Enter');

            // 1. CÁLCULO DE TIEMPOS DE LETRAS ESTÁNDAR (Convertido a segundos con 4 decimales)
            features['H.period'] = ((p.up?.time - p.down?.time) / 1000.0).toFixed(4);
            features['DD.period.t'] = ((t.down?.time - p.down?.time) / 1000.0).toFixed(4);
            features['UD.period.t'] = ((t.down?.time - p.up?.time) / 1000.0).toFixed(4);

            features['H.t'] = ((t.up?.time - t.down?.time) / 1000.0).toFixed(4);
            features['DD.t.i'] = ((i.down?.time - t.down?.time) / 1000.0).toFixed(4);
            features['UD.t.i'] = ((i.down?.time - t.up?.time) / 1000.0).toFixed(4);

            features['H.i'] = ((i.up?.time - i.down?.time) / 1000.0).toFixed(4);
            features['DD.i.e'] = ((e.down?.time - i.down?.time) / 1000.0).toFixed(4);
            features['UD.i.e'] = ((e.down?.time - i.up?.time) / 1000.0).toFixed(4);

            features['H.e'] = ((e.up?.time - e.down?.time) / 1000.0).toFixed(4);
            features['DD.e.five'] = ((f.down?.time - e.down?.time) / 1000.0).toFixed(4);
            features['UD.e.five'] = ((f.down?.time - e.up?.time) / 1000.0).toFixed(4);

            features['H.five'] = ((f.up?.time - f.down?.time) / 1000.0).toFixed(4);

            // 2. INGENIERÍA DE CARACTERÍSTICAS ADAPTATIVA (Manejo de Shift vs CapsLock)
            if (shiftDown && shiftUp) {
                // Caso A: El usuario capitalizó usando Shift (izquierdo o derecho)
                features['DD.five.Shift.r'] = ((shiftDown.time - f.down.time) / 1000.0).toFixed(4);
                features['UD.five.Shift.r'] = ((shiftDown.time - f.up.time) / 1000.0).toFixed(4);
                features['H.Shift.r'] = ((shiftUp.time - shiftDown.time) / 1000.0).toFixed(4);
                features['DD.Shift.r.o'] = ((r.down?.time - shiftDown.time) / 1000.0).toFixed(4);
                features['UD.Shift.r.o'] = ((r.down?.time - shiftUp.time) / 1000.0).toFixed(4);
            } else {
                // Caso B: El usuario usó Bloq Mayús. Se rellena con 0.0000 para no alterar las dimensiones,
                // calculando la transición directa desde el '5' hacia la 'R'.
                features['DD.five.Shift.r'] = (0.0).toFixed(4);
                features['UD.five.Shift.r'] = (0.0).toFixed(4);
                features['H.Shift.r'] = (0.0).toFixed(4);
                features['DD.Shift.r.o'] = ((r.down?.time - f.down?.time) / 1000.0).toFixed(4);
                features['UD.Shift.r.o'] = ((r.down?.time - f.up?.time) / 1000.0).toFixed(4);
            }

            // Tiempos del resto de la cadena
            features['H.o'] = ((o.up?.time - o.down?.time) / 1000.0).toFixed(4);
            features['DD.o.a'] = ((a.down?.time - o.down?.time) / 1000.0).toFixed(4);
            features['UD.o.a'] = ((a.down?.time - o.up?.time) / 1000.0).toFixed(4);

            features['H.a'] = ((a.up?.time - a.down?.time) / 1000.0).toFixed(4);
            features['DD.a.n'] = ((n.down?.time - a.down?.time) / 1000.0).toFixed(4);
            features['UD.a.n'] = ((n.down?.time - a.up?.time) / 1000.0).toFixed(4);

            features['H.n'] = ((n.up?.time - n.down?.time) / 1000.0).toFixed(4);
            features['DD.n.l'] = ((l.down?.time - n.down?.time) / 1000.0).toFixed(4);
            features['UD.n.l'] = ((l.down?.time - n.up?.time) / 1000.0).toFixed(4);

            features['H.l'] = ((l.up?.time - l.down?.time) / 1000.0).toFixed(4);
            features['DD.l.Return'] = ((ret.down?.time - l.down?.time) / 1000.0).toFixed(4);
            features['UD.l.Return'] = ((ret.down?.time - l.up?.time) / 1000.0).toFixed(4);
            features['H.Return'] = ((ret.up?.time - ret.down?.time) / 1000.0).toFixed(4);

            // 3. ENCAPSULAMIENTO DEL VECTOR DE 34 COLUMNAS
            let row = [
                subject,
                '1', // sessionIndex fijo
                repCounter++, 
                features['H.period'], features['DD.period.t'], features['UD.period.t'],
                features['H.t'], features['DD.t.i'], features['UD.t.i'],
                features['H.i'], features['DD.i.e'], features['UD.i.e'],
                features['H.e'], features['DD.e.five'], features['UD.e.five'],
                features['H.five'], features['DD.five.Shift.r'], features['UD.five.Shift.r'],
                features['H.Shift.r'], features['DD.Shift.r.o'], features['UD.Shift.r.o'],
                features['H.o'], features['DD.o.a'], features['UD.o.a'],
                features['H.a'], features['DD.a.n'], features['UD.a.n'],
                features['H.n'], features['DD.n.l'], features['UD.n.l'],
                features['H.l'], features['DD.l.Return'], features['UD.l.Return'],
                features['H.Return']
            ];

            samples.push(row);
            sampleCountDisplay.textContent = samples.length;
            showMessage("¡Muestra guardada correctamente! " + TARGET_PASSWORD);
            resetCapture(false);
        }

        function resetCapture(isError) {
            capturedEvents = [];
            setTimeout(() => {
                passwordField.value = '';
                passwordField.focus();
            }, 500);
        }

        downloadBtn.addEventListener('click', () => {
            if (samples.length === 0) {
                alert("Aún no hay muestras capturadas para descargar.");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += COLUMNS.join(",") + "\n";
            samples.forEach(rowArray => {
                csvContent += rowArray.join(",") + "\n";
            });

            var encodedUri = encodeURI(csvContent);
            var link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Dinamica_Tecleo_${subjectIdField.value || 'Sinodal'}_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
